name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      - name: Detect version change
        id: version
        shell: bash
        run: |
          set -euo pipefail

          AFTER_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version || '')")
          echo "after_version=${AFTER_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "before_version=manual" >> "$GITHUB_OUTPUT"
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Manual release requested for ${AFTER_VERSION}."
            exit 0
          fi

          BEFORE_SHA="${{ github.event.before }}"
          BEFORE_VERSION=""

          if [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE_SHA^{commit}" 2>/dev/null; then
            if git show "$BEFORE_SHA:package.json" >/tmp/package-before.json 2>/dev/null; then
              BEFORE_VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/package-before.json', 'utf8')).version || '')")
            fi
          fi

          echo "before_version=${BEFORE_VERSION}" >> "$GITHUB_OUTPUT"

          if [ "$BEFORE_VERSION" != "$AFTER_VERSION" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
            echo "Detected version change: ${BEFORE_VERSION:-<none>} -> ${AFTER_VERSION}"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No package version change detected; skipping npm publish."
          fi

      - name: Check npm for existing version
        id: npm
        if: steps.version.outputs.publish == 'true'
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.after_version }}
        run: |
          set -euo pipefail

          if npm view "ccjk@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "ccjk@${PACKAGE_VERSION} already exists on npm; skipping publish."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
            echo "ccjk@${PACKAGE_VERSION} is not yet published."
          fi

      - name: Install dependencies
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: pnpm install --frozen-lockfile

      - name: Fix catalog references
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: node scripts/fix-package-catalog.mjs

      - name: Build workspace release dependencies
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: pnpm build:release:deps

      - name: Run TypeScript check
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: pnpm typecheck

      - name: Run release smoke suite
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: pnpm test:release

      - name: Build project
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        run: pnpm build

      - name: Publish package
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public

      - name: Create git tag
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        shell: bash
        env:
          PACKAGE_VERSION: ${{ steps.version.outputs.after_version }}
        run: |
          set -euo pipefail

          TAG="v${PACKAGE_VERSION}"
          if git ls-remote --tags origin "${TAG}" | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists on origin."
          else
            git tag "${TAG}" "${GITHUB_SHA}"
            git push origin "${TAG}"
          fi

      - name: Create GitHub Release
        if: steps.version.outputs.publish == 'true' && steps.npm.outputs.already_published != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PACKAGE_VERSION: ${{ steps.version.outputs.after_version }}
        run: |
          set -euo pipefail

          TAG="v${PACKAGE_VERSION}"
          RELEASE_NOTES=$(cat <<EOF
          Published ccjk@${PACKAGE_VERSION} to npm.

          Install or verify with:
          - npm install -g ccjk@${PACKAGE_VERSION}
          - npx --yes ccjk@latest --version
          EOF
          )

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
          else
            gh release create "${TAG}" \
              --verify-tag \
              --title "Release ${TAG}" \
              --notes "${RELEASE_NOTES}" \
              --generate-notes \
              --latest
          fi
